[package]
name = "distributed_llm_os"
version = "0.1.0"
edition = "2021"
description = "OS spanning multiple nodes where processes migrate toward GPU-equipped hosts automatically."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
