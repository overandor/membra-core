[package]
name = "unikernel_llm_os"
version = "0.1.0"
edition = "2021"
description = "Single-address-space unikernel optimized for single-tenant LLM inference on cloud hypervisors."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
