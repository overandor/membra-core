[package]
name = "embedded_llm_os"
version = "0.1.0"
edition = "2021"
description = "Sub-MB kernel for MCUs; runs TinyML models with on-device fine-tuning via federated delta."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
