[package]
name = "container_native_llm_os"
version = "0.1.0"
edition = "2021"
description = "Kernel is a container orchestrator; every LLM inference is a sandboxed container with cgroup v3."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
