[package]
name = "exokernel_llm_os"
version = "0.1.0"
edition = "2021"
description = "Exokernel exposing raw GPU/TPU hardware to user-space LLM runtimes with secure multiplexing."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
