[package]
name = "hierarchical_llm_os"
version = "0.1.0"
edition = "2021"
description = "Ring-0 hosts small model, delegates to ring-1 medium, ring-2 large model via hierarchical calls."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
