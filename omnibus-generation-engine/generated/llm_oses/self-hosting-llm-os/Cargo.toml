[package]
name = "self_hosting_llm_os"
version = "0.1.0"
edition = "2021"
description = "OS can rewrite its own kernel source via LLM and hot-reload without reboot."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
