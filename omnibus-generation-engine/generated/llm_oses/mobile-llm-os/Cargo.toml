[package]
name = "mobile_llm_os"
version = "0.1.0"
edition = "2021"
description = "Battery-aware scheduler quantizing models to NPU and falling back to CPU on thermal throttling."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
