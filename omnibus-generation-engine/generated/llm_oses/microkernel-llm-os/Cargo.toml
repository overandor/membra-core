[package]
name = "microkernel_llm_os"
version = "0.1.0"
edition = "2021"
description = "Microkernel where LLM inference runs as a privileged server with capability-based IPC."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
