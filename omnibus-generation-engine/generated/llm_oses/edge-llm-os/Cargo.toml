[package]
name = "edge_llm_os"
version = "0.1.0"
edition = "2021"
description = "Gateway OS caching model shards and serving them to low-power clients over LoRa/WiFi."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
