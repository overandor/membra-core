[package]
name = "cloud_llm_os"
version = "0.1.0"
edition = "2021"
description = "Multi-tenant kernel with GPU time-slicing and spot-preemptible LLM inference jobs."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
