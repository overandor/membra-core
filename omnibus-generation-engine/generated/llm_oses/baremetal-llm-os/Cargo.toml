[package]
name = "baremetal_llm_os"
version = "0.1.0"
edition = "2021"
description = "No abstractions; user code directly programs GPU DMA rings and token decode loops."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
