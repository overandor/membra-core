[package]
name = "reactive_llm_os"
version = "0.1.0"
edition = "2021"
description = "Reactive streams at kernel level; LLM outputs propagate as observable hot streams."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
