[package]
name = "virtualized_llm_os"
version = "0.1.0"
edition = "2021"
description = "Type-1 hypervisor hosting para-virtualized LLM guests with direct GPU passthrough."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
