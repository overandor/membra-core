[package]
name = "dataflow_llm_os"
version = "0.1.0"
edition = "2021"
description = "OS structured as a dataflow graph; LLM layers are nodes, tensors flow on edges."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
