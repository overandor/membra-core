[package]
name = "hybrid_llm_os"
version = "0.1.0"
edition = "2021"
description = "Seamlessly offloads between on-device NPU, edge GPU, and cloud TPU based on latency cost."
license = "MIT"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true

[dependencies]

[dependencies.bootloader]
version = "0.9"
features = ["map_physical_memory"]
