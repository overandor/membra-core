[package]
name = "dag_ledger_sdk"
version = "0.1.0"
edition = "2021"
description = "Directed acyclic graph ledger for high-throughput asynchronous consensus."
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
