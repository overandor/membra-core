[package]
name = "p2p_content_sdk"
version = "0.1.0"
edition = "2021"
description = "Content-addressed peer-to-peer distribution with Merkle verification."
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
