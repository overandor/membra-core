[package]
name = "iot_sensor_mesh_sdk"
version = "0.1.0"
edition = "2021"
description = "Low-power sensor mesh with time-synchronized data fusion."
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
