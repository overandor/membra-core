[package]
name = "neural_inference_network_sdk"
version = "0.1.0"
edition = "2021"
description = "Distributed neural inference with pipeline parallelism and KV-cache sharding."
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
